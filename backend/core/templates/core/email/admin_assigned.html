<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Siz markaz admini etib tayinlandingiz!</title>
    <style>
        body { font-family: 'Arial', sans-serif; background-color: #f3f4f6; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 40px auto; background-color: #ffffff; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header { background-color: #4f46e5; color: #ffffff; text-align: center; padding: 20px 10px; }
        .header h1 { margin: 0; font-size: 22px; }
        .content { padding: 30px 40px; text-align: center; color: #374151; }
        .content h2 { color: #4f46e5; font-size: 20px; margin-bottom: 15px; }
        .content p { font-size: 16px; line-height: 1.6; margin: 10px 0; }
        .highlight { font-weight: bold; color: #111827; }
        .btn-container { margin-top: 30px; margin-bottom: 10px; }
        .btn { display: inline-block; padding: 12px 24px; background-color: #4f46e5; color: #ffffff; text-decoration: none; border-radius: 6px; font-weight: bold; letter-spacing: 0.5px; }
        .footer { text-align: center; font-size: 13px; color: #9ca3af; padding: 20px; border-top: 1px solid #e5e7eb; background-color: #f9fafb; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Xush kelibsiz!</h1>
        </div>
        <div class="content">
            <h2>Markaz admini huquqi</h2>
            <p>Hurmatli <span class="highlight">{{ name }}</span>,</p>
            <p>Siz <strong>{{ center_name }}</strong>ga admin sifatida biriktirildingiz.</p>
            <p>Biz bilan qulay va tartibli ishlang. O'z vazifalaringizni bajarishga kirishishingiz mumkin.</p>
            
            <div class="btn-container">
                <a href="http://localhost:5173/login" class="btn">Tizimga kirish</a>
            </div>
        </div>
        <div class="footer">
            &copy; 2026 Barcha huquqlar himoyalangan. Tizim xabarnomasi.
        </div>
    </div>
</body>
</html>
